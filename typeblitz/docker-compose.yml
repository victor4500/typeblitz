version: "3.9"

services:
  backend:
    build: ./backend
    container_name: typeblitz-api
    ports:
      - "3001:3001"
    volumes:
      - ./backend/data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: typeblitz-web
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
